<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="The page you requested could not be found. Return to Hostel Manager homepage.">
    <link rel="canonical" href="https://hostelmanager.shoverhub.com/404">
    <title>404 - Page Not Found | Hostel Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        ::selection {
            background: rgba(186, 195, 255, 0.3);
            color: #e5e2e1;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0e0e0e;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffb784;
        }
    </style>
</head>
<body class="min-h-screen bg-[#131313] text-[#e5e2e1]">
    <main class="flex min-h-screen items-center justify-center px-6 py-16">
        <div class="w-full max-w-2xl rounded-3xl border border-[rgba(255,255,255,0.04)] bg-[#1c1b1b] p-8 shadow-2xl sm:p-10">
            <p class="text-sm font-semibold uppercase tracking-[0.3em] text-[#bac3ff]">Hostel Manager</p>
            <h1 class="mt-4 text-4xl font-extrabold tracking-tight">Page not found</h1>
            <p id="status" class="mt-4 text-base leading-7 text-[#ccc9c8]">
                The page you requested could not be found.
            </p>
            <div class="mt-8 flex flex-wrap gap-4">
                <a href="/" class="rounded-xl bg-[#4453a7] px-5 py-3 font-semibold text-[#e5e2e1] transition hover:bg-[#bac3ff] hover:text-[#131313]">Go to Home</a>
                <a href="/delete-account/" class="rounded-xl border border-[rgba(255,255,255,0.04)] px-5 py-3 font-semibold text-[#e5e2e1] transition hover:bg-[#2a2a2a]">Delete Account</a>
            </div>
        </div>
    </main>

    <script>
        (function () {
            var normalizedPath = window.location.pathname.replace(/\/+$/, '');

            if (/\/delete-account(?:\.html)?$/.test(normalizedPath)) {
                window.location.replace('/delete-account/');
            } else {
                window.location.replace('/');
            }
        })();
    </script>
</body>
</html>
